<div class="container">

  <h1>Gestión de préstamos</h1>

  <!-- ================= FILTROS ================= -->
  <div class="filters">

    <form class="filters-form">

      <mat-form-field>
        <mat-label>Título del juego</mat-label>
        <mat-select [(ngModel)]="filterGame" name="game">
          <mat-option *ngFor="let game of games" [value]="game">
            {{ game.title }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Cliente</mat-label>
        <mat-select [(ngModel)]="filterClient" name="client">
          <mat-option *ngFor="let client of clients" [value]="client">
            {{ client.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Fecha</mat-label>
        <input matInput
               [matDatepicker]="picker"
               [(ngModel)]="filterDate"
               name="date">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

    </form>

    <div class="buttons">
      <button mat-stroked-button (click)="onClean()">Limpiar</button>
      <button mat-flat-button color="primary" (click)="onSearch()">Filtrar</button>
    </div>
  </div>

  <!-- ================= TABLA ================= -->
  <mat-table [dataSource]="dataSource">

    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef>Identificador</mat-header-cell>
      <mat-cell *matCellDef="let p">{{ p.id }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="game">
      <mat-header-cell *matHeaderCellDef>Nombre del juego</mat-header-cell>
      <mat-cell *matCellDef="let p">{{ p.game.title }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="client">
      <mat-header-cell *matHeaderCellDef>Nombre del cliente</mat-header-cell>
      <mat-cell *matCellDef="let p">{{ p.client.name }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="startDate">
      <mat-header-cell *matHeaderCellDef>Fecha de préstamo</mat-header-cell>
      <mat-cell *matCellDef="let p">{{ p.startDate | date:'dd/MM/yyyy' }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="endDate">
      <mat-header-cell *matHeaderCellDef>Fecha de devolución</mat-header-cell>
      <mat-cell *matCellDef="let p">{{ p.endDate | date:'dd/MM/yyyy' }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef></mat-header-cell>
      <mat-cell *matCellDef="let p">
        <button mat-icon-button color="warn" (click)="deletePrestamo(p)">
          <mat-icon>clear</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>

  </mat-table>

  <!-- ================= PAGINADOR ================= -->
  <mat-paginator
    [pageSize]="pageSize"
    [pageIndex]="pageNumber"
    [length]="totalElements"
    [pageSizeOptions]="[5,10,20]"
    (page)="loadPage($event)">
  </mat-paginator>

  <!-- ================= BOTÓN NUEVO ================= -->
  <div class="buttons bottom">
    <button mat-flat-button color="primary" (click)="createPrestamo()">
      Nuevo préstamo
    </button>
  </div>

</div>
